# 运行入口：路径相对项目根目录（config/ 的上一级）
io:
  input: data/sample/sku_monthly.csv
  output: output/priority_20261407.csv
  mode: yoy   # mom | yoy

columns:
  sku_id: sku_id
  period: period
  unit: unit
  regular_price: regular_price
  promo_price: promo_price

period:
  format: YYYY14MM
  report: "20261407"   # 报告期，YYYY14MM

weights:
  regular: 0.5
  promotion: 0.5

windows:
  rolling: 12
  min_history: 6

priority:
  top_n: 50

epsilon: 1.0e-9
z_threshold: 2.0
